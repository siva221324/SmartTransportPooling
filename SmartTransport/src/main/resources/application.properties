spring.application.name=SmartTransport

# MySQL Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/smart_transport?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=SmartTransportSecretKeyForJWTTokenGeneration2026MustBeLongEnough256Bits!!
app.jwt.expiration-ms=86400000

# Server
server.port=8081

# Email (SMTP) - Configure with your email provider
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App URL (for email links)
app.frontend-url=http://localhost:4200

# Email verification (set to true to require email verification on login/register)
app.email-verification-enabled=false

