spring.application.name=SmartTransport

# MySQL Datasource
spring.datasource.url=${DB_URL}

spring.datasource.driver-class-name=org.postgresql.Driver
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Server
server.port=8081

# Email (SMTP) - Configure with your email provider
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=megastar111992@gmail.com
spring.mail.password=sejzzswahmqpvcsc
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App URL (for email links)
app.frontend-url=http://localhost:4200

# Email verification (set to true to require email verification on login/register)
app.email-verification-enabled=false

